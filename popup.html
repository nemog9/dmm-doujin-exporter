<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; padding: 16px; font-family: sans-serif; font-size: 14px; color: #333; }
    h2 { margin: 0 0 12px; font-size: 15px; color: #c00; }
    label { display: block; margin-bottom: 4px; font-size: 12px; color: #666; }
    input[type="number"] { width: 100%; padding: 6px 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 10px; font-size: 13px; }
    .file-area { border: 1px dashed #ccc; border-radius: 4px; padding: 10px; text-align: center; margin-bottom: 10px; cursor: pointer; background: #fafafa; font-size: 12px; color: #888; }
    .file-area.loaded { border-color: #4a4; color: #4a4; background: #f0fff0; }
    .check-label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; margin-bottom: 10px; cursor: pointer; }
    .check-label input[type="checkbox"] { margin: 0; cursor: pointer; }
    button { width: 100%; padding: 8px; background: #c00; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
    button:hover { background: #a00; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    input[type="file"] { display: none; }
    #progressArea { display: none; margin-top: 12px; background: #f5f5f5; border-radius: 6px; padding: 10px; }
    #progressArea.active { display: block; }
    .progress-bar-wrap { background: #ddd; border-radius: 4px; height: 8px; margin: 6px 0 8px; overflow: hidden; }
    .progress-bar { height: 100%; background: #c00; border-radius: 4px; width: 0%; transition: width 0.3s; }
    #progressLabel { font-size: 12px; color: #555; margin-bottom: 2px; }
    #progressDetail { font-size: 11px; color: #888; min-height: 14px; }
    #statusMsg { margin-top: 8px; font-size: 12px; min-height: 16px; }
    #statusMsg.error { color: #c00; }
    #statusMsg.success { color: #4a4; }
  </style>
</head>
<body>
  <h2>📦 DMM Doujin Exporter</h2>
  <label>既存CSVを読み込む（差分のみ取得・マージ出力）</label>
  <div class="file-area" id="fileArea">
    クリックしてCSVを選択（任意）
    <input type="file" id="csvFile" accept=".csv">
  </div>
  <label>取得件数（0で全件）</label>
  <input type="number" id="limit" value="0" min="0">
  <label class="check-label">
    <input type="checkbox" id="fullScan">
    全件探索モード（重複検知後も最後までスクロール）
  </label>
  <button id="startBtn">取得開始</button>
  <div id="progressArea">
    <div id="progressLabel">準備中...</div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div id="progressDetail"></div>
  </div>
  <div id="statusMsg"></div>
  <script src="popup.js"></script>
</body>
</html>
